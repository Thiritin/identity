openapi: 3.0.0
servers:
  - description: Production
    url: 'https://identity.eurofurence.org/api/v2'
  - description: Local
    url: 'https://identity.eurofurence.localhost/api/v2'
x-tagGroups:
  - name: Open ID Connect
    tags:
      - Open ID Connect
  - name: Resources
    tags:
      - Staff
      - Groups
      - Group Members
      - User Metadata
      - Notifications
      - Conventions
info:
  version: 2.0.0
  title: Eurofurence Identity
  contact:
    email: me@thiritin.com
    name: Thiritin
  license:
    name: Licensed under MIT
    url: 'https://github.com/Thiritin/identity/blob/main/LICENSE'
  termsOfService: 'https://help.eurofurence.org/legal/terms'
  description: |-
    API v2 endpoints for the Eurofurence Identity service.

    ## Response format

    All v2 endpoints return JSON at the top level. List endpoints return a **bare JSON array**
    (no `data`/`links`/`meta` envelope). Single resources return a bare object.

    ## Pagination

    List endpoints are paginated. Pagination metadata is returned via HTTP response headers,
    following the GitHub REST API convention ([RFC 5988](https://tools.ietf.org/html/rfc5988)):

    | Header | Description |
    |---|---|
    | `Link` | Relational URLs for `prev`, `next`, and (when available) `first` / `last` pages. |
    | `X-Per-Page` | Number of items per page. |
    | `X-Current-Page` | The current page number. |
    | `X-Total-Count` | Total number of items (only present on endpoints that compute a total). |
    | `X-Total-Pages` | Total number of pages (only present on endpoints that compute a total). |

    Clients should follow `Link: ...; rel="next"` until it is absent rather than computing page
    numbers themselves. Most list endpoints use cursor-style pagination without a total count
    (for performance) — `X-Total-Count` will not be present on those.

    Supported query parameters: `page` (page number, 1-based) and, where noted, `per_page`.

    ## OAuth2 Scopes

    ### Identity
    - `openid`: Basic OpenID Connect functionality
    - `profile`: User's display name and avatar
    - `email`: User's email address and verification status
    - `offline` / `offline_access`: Refresh tokens

    ### Staff
    - `staff.my.read`: Access to the authenticated user's own staff profile (firstname, lastname, phone, etc.)
    - `staff.all.read`: Access to all staff members' profiles (respects per-user visibility settings)

    ### Groups
    - `groups`: User's group memberships (returned in userinfo)
    - `groups.read`: Read group details via the API
    - `groups.write`: Create/update groups and manage members
    - `groups.delete`: Delete groups

    ### Other
    - `view_full_staff_details`: Access email addresses in group/user listings
    - `metadata.read`: Read per-app user metadata
    - `metadata.write`: Write per-app user metadata
    - `notifications.send`: Send notifications to users via the notification service (client credentials only)
  x-logo:
    url: 'https://raw.githubusercontent.com/Thiritin/identity/main/resources/assets/ef.svg'
    backgroundColor: '#004e4c'
    altText: Eurofurence e.V. Logo
tags:
  - name: Open ID Connect
    description: |-
      OpenID Connect and OAuth2 endpoints.

      The discovery, authorization, token, and JWKS endpoints are served by [Ory Hydra](https://www.ory.sh/hydra/) at the **root domain** (`https://identity.eurofurence.org`), not under `/api/v2`.
  - name: Staff
    description: Staff member profiles with visibility-controlled access
  - name: Groups
    description: Group management with type filtering, hierarchy, and inline members
  - name: Group Members
    description: Manage group memberships with real role levels
  - name: User Metadata
    description: Per-app key-value metadata storage for users. Scoped by OAuth client_id.
  - name: Notifications
    description: |-
      Send notifications to users through email, Telegram, and in-app channels.

      Requires client credentials authentication and the `notifications.send` scope. The owning app must have notifications enabled by an admin.
  - name: Conventions
    description: Public list of Eurofurence conventions. No authentication required.
security:
  - OpenID:
      - openid
      - profile
      - email
      - groups
      - staff.my.read
      - staff.all.read
      - groups.read
      - groups.write
      - groups.delete
      - metadata.read
      - metadata.write
  - AccessToken:
      - groups.read
      - groups.write
      - groups.delete
      - staff.my.read
      - staff.all.read
      - metadata.read
      - metadata.write
paths:
  /.well-known/openid-configuration:
    servers:
      - description: Production
        url: 'https://identity.eurofurence.org'
      - description: Local
        url: 'https://identity.eurofurence.localhost'
    get:
      summary: OpenID Connect Discovery
      description: |-
        Returns the OpenID Connect discovery document containing metadata about the authorization server,
        including endpoint URLs, supported scopes, response types, and signing algorithms.

        This is the standard [OpenID Connect Discovery](https://openid.net/specs/openid-connect-discovery-1_0.html) endpoint.
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenIDConfiguration'
      tags:
        - Open ID Connect
      operationId: getOpenIDConfiguration
  /oauth2/auth:
    servers:
      - description: Production
        url: 'https://identity.eurofurence.org'
      - description: Local
        url: 'https://identity.eurofurence.localhost'
    get:
      summary: Authorization Endpoint
      description: |-
        The OAuth 2.0 authorization endpoint. Initiates the authorization code flow by redirecting the user to the login and consent screens.

        This is a browser-based flow. Redirect the user's browser to this URL with the appropriate query parameters.
      security: []
      parameters:
        - in: query
          name: response_type
          required: true
          schema:
            type: string
            enum: [code]
          description: Must be `code` for the authorization code flow
        - in: query
          name: client_id
          required: true
          schema:
            type: string
          description: Your OAuth2 client ID
        - in: query
          name: redirect_uri
          required: true
          schema:
            type: string
            format: uri
          description: The URI to redirect the user back to after authorization
        - in: query
          name: scope
          required: true
          schema:
            type: string
          description: Space-separated list of requested scopes
          example: openid profile email groups
        - in: query
          name: state
          required: true
          schema:
            type: string
          description: An opaque value used to prevent CSRF attacks. Will be returned in the callback.
        - in: query
          name: nonce
          schema:
            type: string
          description: A random value to associate the ID token with the client session
      responses:
        '302':
          description: Redirects the user to the login/consent flow
      tags:
        - Open ID Connect
      operationId: authorizeUser
  /oauth2/token:
    servers:
      - description: Production
        url: 'https://identity.eurofurence.org'
      - description: Local
        url: 'https://identity.eurofurence.localhost'
    post:
      summary: Token Endpoint
      description: |-
        Exchange an authorization code for access and refresh tokens, or refresh an existing token.

        Requires client authentication via `client_id` and `client_secret` in the request body or via HTTP Basic Auth.
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Bad Request (invalid grant, expired code, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'
      tags:
        - Open ID Connect
      operationId: getToken
  /.well-known/jwks.json:
    servers:
      - description: Production
        url: 'https://identity.eurofurence.org'
      - description: Local
        url: 'https://identity.eurofurence.localhost'
    get:
      summary: JSON Web Key Set
      description: |-
        Returns the public keys used to verify ID tokens and other signed JWTs issued by the authorization server.

        Clients should cache this response and refresh it periodically or when encountering an unknown `kid` in a JWT header.
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSONWebKeySet'
      tags:
        - Open ID Connect
      operationId: getJWKS
  /userinfo:
    get:
      summary: Get userinfo
      description: |-
        Returns identity claims for the authenticated user based on granted scopes.

        **Differences from v1:**
        - `groups` scope returns objects with name, type, slug, level, and title instead of just id arrays
        - `staff.my.read` scope adds staff profile fields (firstname, lastname, etc.)
      security:
        - OpenID:
            - openid
            - profile
            - email
            - groups
            - staff.my.read
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Userinfo'
      tags:
        - Open ID Connect
      operationId: getUserinfo
  /introspect:
    post:
      summary: Introspect token
      description: |-
        Check if an access or refresh token is active. Returns token metadata if active.

        Requires client authentication via Bearer token (client_secret).
      security:
        - ClientSecret: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenIntrospectionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenIntrospectionResponse'
      tags:
        - Open ID Connect
      operationId: introspectToken
  /staff/me:
    get:
      summary: Get own staff profile
      description: Returns the authenticated user's full staff profile including all PII fields.
      security:
        - OpenID:
            - staff.my.read
        - AccessToken:
            - staff.my.read
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffProfile'
      tags:
        - Staff
      operationId: getStaffMe
  /staff:
    get:
      summary: List all staff members
      description: |-
        Returns a paginated list of all staff members.

        PII fields are filtered based on the viewer's relationship to each staff member,
        respecting per-user visibility settings (AllStaff, MyDepartments, LeadsAndDirectors, DirectorsOnly).
        Fields that are not visible to the viewer are omitted from the response.
      security:
        - OpenID:
            - staff.all.read
        - AccessToken:
            - staff.all.read
      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: Search staff members by name
          example: John
        - in: query
          name: page
          schema:
            type: integer
          description: Page number for pagination
          example: 1
      responses:
        '200':
          description: OK
          headers:
            Link:
              $ref: '#/components/headers/Link'
            X-Per-Page:
              $ref: '#/components/headers/X-Per-Page'
            X-Current-Page:
              $ref: '#/components/headers/X-Current-Page'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StaffProfile'
      tags:
        - Staff
      operationId: getStaffList
  '/staff/{user}':
    get:
      summary: Get staff member
      description: |-
        Returns a single staff member's profile.

        PII fields are filtered based on the viewer's relationship to the staff member.
        Returns 404 if the user is not a staff member.
      security:
        - OpenID:
            - staff.all.read
        - AccessToken:
            - staff.all.read
      parameters:
        - in: path
          name: user
          required: true
          schema:
            type: string
          description: User's id
          example: 1VJEQAYWW54TZ5VD
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffProfile'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Staff
      operationId: getStaffMember
  /groups/tree:
    get:
      summary: Get group hierarchy tree
      description: |-
        Returns the full organizational hierarchy as a nested tree structure.

        The tree starts from divisions and includes departments and teams.
        Each node includes a `is_mine` flag indicating whether the authenticated user is a member.
      security:
        - OpenID:
            - groups.read
        - AccessToken:
            - groups.read
      parameters:
        - in: query
          name: depth
          schema:
            type: integer
            default: 3
            minimum: 1
            maximum: 3
          description: 'Maximum depth of the tree (1=divisions only, 2=+departments, 3=+teams)'
          example: 2
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GroupTreeNode'
      tags:
        - Groups
      operationId: getGroupTree
  /groups:
    get:
      summary: List groups
      description: |-
        Returns a paginated list of groups.

        Staff members can see all hierarchy groups. Non-staff users only see groups they belong to.
      security:
        - OpenID:
            - groups.read
        - AccessToken:
            - groups.read
      parameters:
        - in: query
          name: type
          schema:
            type: string
          description: 'Filter by group type(s), comma-separated'
          example: division,department
        - in: query
          name: include
          schema:
            type: string
          description: 'Include related data, comma-separated (members, children, parent)'
          example: members,children
        - in: query
          name: search
          schema:
            type: string
          description: Search groups by name
          example: IT
        - in: query
          name: page
          schema:
            type: integer
          description: Page number for pagination
          example: 1
      responses:
        '200':
          description: OK
          headers:
            Link:
              $ref: '#/components/headers/Link'
            X-Per-Page:
              $ref: '#/components/headers/X-Per-Page'
            X-Current-Page:
              $ref: '#/components/headers/X-Current-Page'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Group'
