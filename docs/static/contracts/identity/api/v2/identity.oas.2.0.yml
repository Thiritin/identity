  '/groups/{group}/members':
    get:
      summary: List group members
      description: Returns a paginated list of group members with their roles and titles.
      security:
        - OpenID:
            - groups.read
        - AccessToken:
            - groups.read
      parameters:
        - in: path
          name: group
          required: true
          schema:
            type: string
          description: Group id
          example: Y6K08PEKXG9Q7ZWJ
        - in: query
          name: level
          schema:
            type: string
          description: 'Filter by member level(s), comma-separated'
          example: director,team_lead
        - in: query
          name: search
          schema:
            type: string
          description: Search members by name
          example: John
        - in: query
          name: per_page
          schema:
            type: integer
            default: 25
          description: Results per page
        - in: query
          name: page
          schema:
            type: integer
          description: Page number
      responses:
        '200':
          description: OK
          headers:
            Link:
              $ref: '#/components/headers/Link'
            X-Per-Page:
              $ref: '#/components/headers/X-Per-Page'
            X-Current-Page:
              $ref: '#/components/headers/X-Current-Page'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GroupMember'
      tags:
        - Group Members
      operationId: getGroupMembers
    post:
      summary: Add member
      description: |
        Add a user to a group. The user is identified by **exactly one** of
        `email`, `username` (IDP login name), or `user_id` (hashid).

        ### Staff promotion side-effect
        Adding a user to a group of type `department` or `team` implies staff
        membership. If the user is not already in the `staff` group, the request
        is rejected with HTTP 422 unless `allow_making_staff: true` is set.

        When `allow_making_staff` is true and the user is not yet staff, they
        will be added to the `staff` group automatically as part of this request.
        For `department` additions, this happens via a background listener; for
        `team` additions, it is performed inline.

        This guard exists so that bulk imports cannot silently promote non-staff
        users. It defaults to `false` for safety.

        See also: [Concepts — Groups](/identity/concepts/groups) for the group
        hierarchy and function groups.
      security:
        - OpenID:
            - groups.write
        - AccessToken:
            - groups.write
      parameters:
        - in: path
          name: group
          required: true
          schema:
            type: string
          description: Group id
          example: Y6K08PEKXG9Q7ZWJ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMemberForm'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupMember'
        '422':
          description: |
            Validation Error. Common cases:
            - No identifier provided (`email`, `username`, or `user_id` required).
            - User has not verified their email.
            - User is already a member of this group.
            - User is not staff and `allow_making_staff` was not set — error key `allow_making_staff`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Group Members
      operationId: addGroupMember
  '/groups/{group}/members/{user}':
    patch:
      summary: Update member
      description: Update a member's level or title within a group.
      security:
        - OpenID:
            - groups.write
        - AccessToken:
            - groups.write
      parameters:
        - in: path
          name: group
          required: true
          schema:
            type: string
          description: Group id
          example: Y6K08PEKXG9Q7ZWJ
        - in: path
          name: user
          required: true
          schema:
            type: string
          description: User id
          example: 1VJEQAYWW54TZ5VD
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMemberForm'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupMember'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Group Members
      operationId: updateGroupMember
    delete:
      summary: Remove member
      description: Remove a user from a group.
      security:
        - OpenID:
            - groups.write
        - AccessToken:
            - groups.write
      parameters:
        - in: path
          name: group
          required: true
          schema:
            type: string
          description: Group id
          example: Y6K08PEKXG9Q7ZWJ
        - in: path
          name: user
          required: true
          schema:
            type: string
          description: User id
          example: 1VJEQAYWW54TZ5VD
      responses:
        '204':
          description: No Content
      tags:
        - Group Members
      operationId: removeGroupMember
  /metadata:
    get:
      summary: List all metadata
      description: Returns all key-value pairs stored by the authenticated app for the current user.
      security:
        - OpenID:
            - metadata.read
        - AccessToken:
            - metadata.read
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Metadata'
      tags:
        - User Metadata
      operationId: getMetadata
  '/metadata/{key}':
    get:
      summary: Get metadata value
      description: Returns a single metadata value by key.
      security:
        - OpenID:
            - metadata.read
        - AccessToken:
            - metadata.read
      parameters:
        - in: path
          name: key
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9._-]+$'
          description: The metadata key
          example: billing.address.city
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Metadata'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - User Metadata
      operationId: getMetadataKey
    put:
      summary: Create or update metadata
      description: Creates or updates a metadata key-value pair. Returns 201 on create, 200 on update.
      security:
        - OpenID:
            - metadata.write
        - AccessToken:
            - metadata.write
      parameters:
        - in: path
          name: key
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9._-]+$'
          description: The metadata key
          example: billing.address.city
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MetadataValue'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Metadata'
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Metadata'
      tags:
        - User Metadata
      operationId: putMetadataKey
    delete:
      summary: Delete metadata
      description: Deletes a metadata key-value pair.
      security:
        - OpenID:
            - metadata.write
        - AccessToken:
            - metadata.write
      parameters:
        - in: path
          name: key
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9._-]+$'
          description: The metadata key
          example: billing.address.city
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - User Metadata
      operationId: deleteMetadataKey
  /notifications:
    post:
      summary: Send a notification
      description: |-
        Dispatch a notification to a single user. The type must be registered under your app. Channel delivery is resolved based on the user's notification preferences, with transactional types always delivered via their default channels regardless of user preferences.
      security:
        - ClientSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendNotificationRequest'
      responses:
        '202':
          description: Accepted and queued for delivery
        '403':
          description: Forbidden (missing scope or app not enabled)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Type or user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
      tags:
        - Notifications
      operationId: sendNotification
  /conventions:
    get:
      summary: List conventions
      description: |-
        Returns a list of all Eurofurence conventions ordered by year (ascending).

        This endpoint is public and does not require authentication.
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Convention'
      tags:
        - Conventions
      operationId: getConventions
  /conventions/current:
    get:
      summary: Get current convention
      description: |-
        Returns the next upcoming or currently running convention
        (the earliest convention whose `end_date` is today or later).

        This endpoint is public and does not require authentication.
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Convention'
        '404':
          description: No upcoming convention found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Conventions
      operationId: getCurrentConvention
components:
  schemas:
    Userinfo:
      type: object
      properties:
        sub:
          type: string
          description: User's unique identifier (id)
          example: 1VJEQAYWW54TZ5VD
        email:
          type: string
          description: User's email (requires `email` scope)
          example: user@example.com
        email_verified:
          type: boolean
          description: Whether email is verified (requires `email` scope)
        name:
          type: string
          description: Display name (requires `profile` scope)
          example: FurryUser42
        avatar:
          type: string
          nullable: true
          description: Avatar URL (requires `profile` scope)
        groups:
          type: array
          description: 'Group memberships with details (requires `groups` scope). In v2, returns objects instead of just id strings.'
          items:
            type: object
            properties:
              id:
                type: string
                example: Y6K08PEKXG9Q7ZWJ
              name:
                type: string
                example: Information Technology
              type:
                type: string
                enum: [none, division, department, team, automated, root]
                example: department
              slug:
                type: string
                example: operations/information-technology
              level:
                type: string
                enum: [member, team_lead, director, division_director]
                example: member
              title:
                type: string
                nullable: true
                example: App Developer
        firstname:
          type: string
          description: First name (requires `staff.my.read` scope)
          example: John
        lastname:
          type: string
          description: Last name (requires `staff.my.read` scope)
          example: Doe
        birthdate:
          type: string
          format: date
          nullable: true
          description: Date of birth (requires `staff.my.read` scope)
          example: '1990-01-15'
        phone:
          type: string
          nullable: true
          description: Phone number (requires `staff.my.read` scope)
        telegram_username:
          type: string
          nullable: true
          description: Telegram username (requires `staff.my.read` scope)
        spoken_languages:
          type: array
          nullable: true
          description: Spoken languages (requires `staff.my.read` scope)
          items:
            type: string
        credit_as:
          type: string
          nullable: true
          description: Preferred credit name (requires `staff.my.read` scope)
        nda_checked_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the last positive NDA check; `null` if never confirmed (requires `staff.my.read` scope)
    TokenIntrospectionRequest:
      type: object
      properties:
        token:
          type: string
          description: The token to introspect
        scope:
          type: string
          description: Space-separated list of scopes to check
      required:
        - token
    TokenIntrospectionResponse:
      type: object
      properties:
        active:
          type: boolean
          description: Whether the token is active
        sub:
          type: string
        client_id:
          type: string
        scope:
          type: string
        exp:
          type: integer
          format: int64
        iat:
          type: integer
          format: int64
        iss:
          type: string
        token_type:
          type: string
        token_use:
          type: string
    StaffProfile:
      type: object
      description: 'Staff member profile. PII fields may be absent based on the viewer''s relationship to the staff member.'
      properties:
        id:
          type: string
          description: User id
          example: 1VJEQAYWW54TZ5VD
        name:
          type: string
          description: Display name
          example: FurryUser42
        avatar:
          type: string
          nullable: true
          description: Avatar URL
        nda_checked_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the last positive NDA check; `null` if never confirmed
        firstname:
          type: string
          description: First name (visibility-controlled)
          example: John
        lastname:
          type: string
          description: Last name (visibility-controlled)
          example: Doe
        birthdate:
          type: string
          format: date
          nullable: true
          description: Date of birth (visibility-controlled)
        phone:
          type: string
          nullable: true
          description: Phone number (visibility-controlled)
        telegram_username:
          type: string
          nullable: true
          description: Telegram username (visibility-controlled)
        spoken_languages:
          type: array
          nullable: true
          description: Spoken languages (visibility-controlled)
          items:
            type: string
        credit_as:
          type: string
          nullable: true
          description: Preferred credit name (visibility-controlled)
        groups:
          type: array
          description: Group memberships
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              type:
                type: string
                enum: [none, division, department, team, automated, root]
              slug:
                type: string
              level:
                type: string
                enum: [member, team_lead, director, division_director]
              title:
                type: string
                nullable: true
    GroupTreeNode:
      type: object
      description: Recursive tree node representing a group in the hierarchy
      properties:
        id:
          type: string
          example: Y6K08PEKXG9Q7ZWJ
        name:
          type: string
          example: Operations
        type:
          type: string
          enum: [division, department, team]
          example: division
        slug:
          type: string
          example: operations
        icon:
          type: string
          nullable: true
          example: briefcase
        member_count:
          type: integer
          description: 'Number of members (for divisions: number of child departments)'
          example: 5
        is_mine:
          type: boolean
          description: Whether the authenticated user is a member
        children:
          type: array
          items:
            $ref: '#/components/schemas/GroupTreeNode'
    Group:
      type: object
      properties:
        id:
          type: string
          description: Group id
          example: Y6K08PEKXG9Q7ZWJ
        type:
          type: string
          enum: [none, division, department, team, automated, root]
          example: department
        name:
          type: string
          example: Information Technology
        description:
          type: string
          nullable: true
        slug:
          type: string
          example: operations/information-technology
        icon:
          type: string
          nullable: true
          example: code
        logo:
          type: string
          nullable: true
          description: Logo URL
        parent_id:
          type: string
          nullable: true
          description: Parent group id
        member_count:
          type: integer
          example: 12
        translations:
          type: object
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        parent:
          description: 'Parent group (only present when include=parent)'
          allOf:
            - $ref: '#/components/schemas/GroupSummary'
        children:
          type: array
          description: 'Child groups (only present when include=children)'
          items:
            $ref: '#/components/schemas/GroupSummary'
        members:
          type: array
          description: 'Group members (only present when include=members)'
          items:
            $ref: '#/components/schemas/GroupMember'
    GroupSummary:
      type: object
      description: Nested group (parent or child) without recursive relations
      properties:
        id:
          type: string
          example: Y6K08PEKXG9Q7ZWJ
        type:
          type: string
          enum: [none, division, department, team, automated, root]
          example: department
        name:
          type: string
          example: Information Technology
        description:
          type: string
          nullable: true
        slug:
          type: string
          example: operations/information-technology
        icon:
          type: string
          nullable: true
          example: code
        logo:
          type: string
          nullable: true
        parent_id:
          type: string
          nullable: true
        member_count:
          type: integer
          example: 12
        translations:
          type: object
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    GroupForm:
      type: object
      properties:
        type:
          type: string
          enum: [none, division, department, team]
          example: department
        name:
          type: string
          example: New Department
        description:
          type: string
          nullable: true
        parent_id:
          type: string
          nullable: true
          description: Parent group id
      required:
        - type
        - name
    GroupMember:
      type: object
      properties:
        user_id:
          type: string
          example: 1VJEQAYWW54TZ5VD
        name:
          type: string
          example: John Doe
        email:
          type: string
          nullable: true
          description: 'Email (only visible with `view_full_staff_details` scope)'
        avatar:
          type: string
          nullable: true
          description: Avatar URL
        level:
          type: string
          enum: [member, team_lead, director, division_director]
          example: member
        title:
          type: string
          nullable: true
          example: App Developer
        credit_as:
          type: string
          nullable: true
          example: J. Doe
    AddMemberForm:
      type: object
      description: |
        Identify the user by **exactly one** of `email`, `username`, or `user_id`.
        `allow_making_staff` is required when adding a non-staff user to a
        `department` or `team` group (see the `addGroupMember` description).
      properties:
        email:
          type: string
          description: 'User email (one of email / username / user_id)'
          example: john@example.com
        username:
          type: string
          description: 'IDP login name (one of email / username / user_id). Matches `users.name`.'
          example: jdoe
        user_id:
          type: string
          description: 'User hashid (one of email / username / user_id)'
          example: 1VJEQAYWW54TZ5VD
        level:
          type: string
          enum: [member, team_lead, director, division_director]
          default: member
        title:
          type: string
          nullable: true
          example: App Developer
        allow_making_staff:
          type: boolean
          default: false
          description: |
            Opt-in flag allowing this request to auto-promote the user to staff
            when adding them to a `department` or `team`. If the user is not
            staff and this flag is false, the request returns 422.
      oneOf:
        - required: [email]
        - required: [username]
        - required: [user_id]
    UpdateMemberForm:
      type: object
      properties:
        level:
          type: string
          enum: [member, team_lead, director, division_director]
        title:
          type: string
          nullable: true
    Metadata:
      type: object
      properties:
        key:
          type: string
          example: billing.address.city
        value:
          type: string
          example: Berlin
    MetadataValue:
      type: object
      properties:
        value:
          type: string
          description: The metadata value to store (max 64KB)
          example: Berlin
      required:
        - value
    SendNotificationRequest:
      type: object
      required: [type, user_id, subject, body]
      properties:
        type:
          type: string
          description: The notification type key registered under your app
          example: payment_reminder
        user_id:
          type: string
          description: The recipient user's id
          example: 1VJEQAYWW54TZ5VD
        subject:
          type: string
          maxLength: 255
          example: Your registration payment is due
        body:
          type: string
          maxLength: 10000
          description: Plain text body. Used by email (fallback), telegram, and bell channels.
          example: You have 7 days to complete payment.
        html:
          type: string
          nullable: true
          description: Optional HTML body used only by the email channel.
          example: <p>You have <strong>7 days</strong>...</p>
        cta:
          type: object
          nullable: true
          description: Optional call-to-action button. Both label and url must be provided together.
          required: [label, url]
          properties:
            label:
              type: string
              maxLength: 255
              example: Pay now
            url:
              type: string
              format: uri
              maxLength: 2048
              example: https://reg.eurofurence.org/pay
    OpenIDConfiguration:
      type: object
      properties:
        issuer:
          type: string
          example: 'https://identity.eurofurence.org/'
        authorization_endpoint:
          type: string
          example: 'https://identity.eurofurence.org/oauth2/auth'
        token_endpoint:
          type: string
          example: 'https://identity.eurofurence.org/oauth2/token'
        userinfo_endpoint:
          type: string
          example: 'https://identity.eurofurence.org/userinfo'
        jwks_uri:
          type: string
          example: 'https://identity.eurofurence.org/.well-known/jwks.json'
        subject_types_supported:
          type: array
          items:
            type: string
          example: [public]
        response_types_supported:
          type: array
          items:
            type: string
          example: [code, id_token, 'code id_token', token]
        scopes_supported:
          type: array
          items:
            type: string
          example: [openid, profile, email, offline, offline_access, groups]
        token_endpoint_auth_methods_supported:
          type: array
          items:
            type: string
          example: [client_secret_basic, client_secret_post]
        id_token_signing_alg_values_supported:
          type: array
          items:
            type: string
          example: [RS256]
        grant_types_supported:
          type: array
          items:
            type: string
          example: [authorization_code, refresh_token, client_credentials]
    TokenRequest:
      type: object
      properties:
        grant_type:
          type: string
          enum: [authorization_code, refresh_token, client_credentials]
          description: The type of grant being requested
        code:
          type: string
          description: The authorization code (required for `authorization_code` grant)
        redirect_uri:
          type: string
          format: uri
          description: Must match the redirect_uri used in the authorization request
        client_id:
          type: string
          description: Your OAuth2 client ID
        client_secret:
          type: string
          description: Your OAuth2 client secret
        refresh_token:
          type: string
          description: The refresh token (required for `refresh_token` grant)
        scope:
          type: string
          description: Space-separated list of requested scopes
      required:
        - grant_type
    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
          description: The access token
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer
          description: Token lifetime in seconds
          example: 3600
        refresh_token:
          type: string
          description: The refresh token (if `offline` or `offline_access` scope was granted)
        id_token:
          type: string
          description: The ID token (if `openid` scope was requested)
        scope:
          type: string
          description: Space-separated list of granted scopes
    OAuthError:
      type: object
      properties:
        error:
          type: string
          description: Error code
          example: invalid_grant
        error_description:
          type: string
          description: Human-readable error description
    JSONWebKeySet:
      type: object
      properties:
        keys:
          type: array
          items:
            type: object
            properties:
              kty:
                type: string
                description: Key type
                example: RSA
              use:
                type: string
                description: Key usage (sig = signature)
                example: sig
              kid:
                type: string
                description: Key ID
              alg:
                type: string
                description: Algorithm
                example: RS256
              n:
                type: string
                description: RSA modulus (Base64url-encoded)
              e:
                type: string
                description: RSA exponent (Base64url-encoded)
                example: AQAB
    Convention:
      type: object
      properties:
        id:
          type: integer
          description: Convention id
          example: 29
        name:
          type: string
          example: Eurofurence 29
        year:
          type: integer
          example: 2026
        theme:
          type: string
          nullable: true
          example: Lost in Translation
        start_date:
          type: string
          format: date
          nullable: true
          example: '2026-08-19'
        end_date:
          type: string
          format: date
          nullable: true
          example: '2026-08-23'
        location:
          type: string
          nullable: true
          example: Hamburg, Germany
        website_url:
          type: string
          format: uri
          nullable: true
          example: https://archive.eurofurence.org/EF29/
        conbook_url:
          type: string
          format: uri
          nullable: true
          example: /conbooks/EF_29_Conbook.pdf
        attendees_count:
          type: integer
          nullable: true
          example: 6451
        background_image_url:
          type: string
          format: uri
          nullable: true
          example: https://s3.example.com/conventions/backgrounds/ef29.jpg
        dailies:
          type: array
          items:
            $ref: '#/components/schemas/ConventionLink'
        videos:
          type: array
          items:
            $ref: '#/components/schemas/ConventionLink'
        photos:
          type: array
          items:
            $ref: '#/components/schemas/ConventionPhoto'
    ConventionLink:
      type: object
      required:
        - title
        - url
      properties:
        title:
          type: string
          example: Issue 67, Thursday
        url:
          type: string
          example: /daily/EF29_2025.09.04_thursday_issue.67.pdf
    ConventionPhoto:
      type: object
      required:
        - title
        - url
        - thumb
      properties:
        title:
          type: string
          example: Group Photo
        url:
          type: string
          format: uri
          example: https://photo.eurofurence.org/2025/Group_Photo/Group-EF29-Everyone.jpg
        thumb:
          type: string
          format: uri
          example: https://photo.eurofurence.org/2025/Group_Photo/Group-EF29-Everyone.thumb.jpg
    Error:
      type: object
      properties:
        message:
          type: string
  headers:
    Link:
      description: |-
        RFC 5988 pagination links. A comma-separated list of URL/relation pairs for
        `prev`, `next`, and (on length-aware paginators) `first` / `last`. Follow
        `rel="next"` until it is absent to iterate a list.
      schema:
        type: string
      example: '<https://identity.eurofurence.org/api/v2/groups/Y6K08PEKXG9Q7ZWJ/members?page=3>; rel="next", <https://identity.eurofurence.org/api/v2/groups/Y6K08PEKXG9Q7ZWJ/members?page=1>; rel="prev"'
    X-Per-Page:
      description: Number of items per page.
      schema:
        type: integer
      example: 25
    X-Current-Page:
      description: The current page number (1-based).
      schema:
        type: integer
      example: 2
    X-Total-Count:
      description: Total number of items. Only present on endpoints that compute a total.
      schema:
        type: integer
      example: 142
    X-Total-Pages:
      description: Total number of pages. Only present on endpoints that compute a total.
      schema:
        type: integer
      example: 6
  securitySchemes:
    OpenID:
      type: openIdConnect
      openIdConnectUrl: 'https://identity.eurofurence.org/.well-known/openid-configuration'
      description: OpenID Connect
    AccessToken:
      type: http
      scheme: bearer
    ClientSecret:
      type: http
      scheme: bearer
